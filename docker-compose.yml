services:
  markshow:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: markshow-dev
    ports:
      - "${APP_PORT:-3737}:3000"
    volumes:
      # Source code bind mount for hot reload
      - .:/app
      # Prevent overwriting container node_modules with host
      - /app/node_modules
      # Prevent .next build cache conflicts
      - /app/.next
      # Persistent storage for presentations (local folder bind mount)
      - ./data/presentations:/data/presentations
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - AI_API_URL=${AI_API_URL:-http://host.docker.internal:11434/v1}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gemma4}
      - AI_SYSTEM_PROMPT=${AI_SYSTEM_PROMPT:-You are an AI assistant helping create and edit Marp markdown presentations.}
      - STORAGE_PATH=${STORAGE_PATH:-/data/presentations}
      - WATCHPACK_POLLING=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
